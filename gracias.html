<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! | Arte y Tierra</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="assets/logos/ayt-arbol-negro.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .gracias {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      background: var(--tierra);
      color: var(--arena);
    }
    .gracias h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 1.5rem; line-height: 1.05; }
    .gracias h1 em { color: var(--ocre); font-style: italic; font-weight: 300; }
    .gracias p { max-width: 520px; font-size: 1.05rem; line-height: 1.6; margin-bottom: 2.5rem; opacity: 0.9; }
    .gracias .btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>

<nav id="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <img src="assets/logos/ayt-arbol-arena.png" alt="Arte y Tierra" class="logo-img">
      <span class="logo-text">ARTE Y TIERRA</span>
    </a>
  </div>
</nav>

<section class="gracias">
  <h1><span class="lang-es">¡Gracias por <em>escribirnos!</em></span><span class="lang-en">Thanks for <em>reaching out!</em></span></h1>
  <p>
    <span class="lang-es">Recibimos tu mensaje. Te respondemos por mail o WhatsApp en las próximas 24–72 horas.</span>
    <span class="lang-en">We received your message. We'll get back to you by email or WhatsApp within 24–72 hours.</span>
  </p>
  <div class="btns">
    <a href="index.html" class="btn-primary"><span class="lang-es">Volver al inicio</span><span class="lang-en">Back to home</span></a>
    <a href="proyectos.html" class="btn-outline"><span class="lang-es">Ver proyectos</span><span class="lang-en">See projects</span></a>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
