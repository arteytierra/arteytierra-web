<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <title>Merci ! | Arte y Tierra</title>
  <meta name="robots" content="noindex">

  <link rel="stylesheet" href="../styles.css">
  <style>
    .gracias {

<nav id="nav">

</nav>

<section class="gracias">
  <h1>Merci de <em>nous avoir écrit !</em></h1>
